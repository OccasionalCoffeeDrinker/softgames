<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Softgames Assignment</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        /* Prevent default touch behaviours (scroll, zoom) on mobile */
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Canvas is injected by PixiJS — ensure it fills the container */
      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
